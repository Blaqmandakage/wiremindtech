<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
    />
   
 <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/solid.css"
    />
   
    <link rel="stylesheet" href="./style/shared.css">
   <link rel="stylesheet" href="/style/darkmode/dark.css">
    <link rel="stylesheet" href="/style/sign/signup.css"> 
   <title>wire mind</title>
</head>
<body>
    <section>
    <div class="backdrop"></div>
    <div class="top-registration">
        <p><a href="signup.html" class="top-redirect js-auth-link">Sign up now</a></p>
    </div>
    <div class="fullpage">
         
        <header>
            <div class="wiremind">
               
                <a href="/index.html" class="wire-mind-logo">WIREMIND</a>
            </div>
 
            <div class="wiremind-search wiremind-search-visible">
                <input type="text" class="wire-mind-search-input"  placeholder="Search for more products">
                <img src="./images/icons/search-icon.png" alt="" class="wire-mind-search-icon">
            </div>
               
    
            <div class="wiremind-carts">
                 
                <a href="/" class="wiremind-cart">
                <img src="./images/icons/checkout-lock-icon.png" alt="" class="wire-mind-cart-logo">
                </a>

                 <button class="wire-toggle wire-toggle-two js-wire-toggle">
                     <i class="fas fa-bars"></i>
                </button>
            </div>   
        </header>

            </div>
            <div class="hide-backdrop">
                <nav>
                <ul class="hide-links">
                    <li> <a href="index.html" class="wire-mind-logos">Home</a></li>
                    <li> <a href="" class="top-redirect js-dark-mode-toggle">mode</a></li>
                    <li> <a href="" class="top-redirect js-dark-mode-toggle js-auth-link">Sign up</a></li>
                </ul>
                </nav>
            </div>
      </section>


      <div class="form-container">
        <div class="head">
                 <h2>Log in</h2>
        </div>
       
        <form action="http://localhost:5000/api/login" method="POSt" class="login-form">
            <label for="" >Username:</label>
            <input type="text" name="username" class="username-input js-input">
            <label for="">Password:</label>
            <input type="text" name="password" class="username-input  js-password">
            <button class="sign">Log in</button>
        </form>
         <div class="dont-have">
        <P>Dont have an Account? </P>
        <a href="signup.html" class="top-redirect yes js-dark-mode-toggle js-auth-link">Sign up</a>
      </div>
      </div>

     

   
      <script type="module" src="/scripts/login.js"></script>
</body>
</html>
